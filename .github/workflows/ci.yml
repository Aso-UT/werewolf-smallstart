name: CI

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Run tests
        run: |
          chmod +x gradlew
          ./gradlew test
